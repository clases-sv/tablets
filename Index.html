<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<base target="_top">
<style>
  :root{
    --bg:#f4f6fb; --card:#fff; --ink:#1e2430; --muted:#697288;
    --line:#e3e8f0; --brand:#2f6df0; --brand-dk:#1f53c4;
    --ok:#1f9d6b; --ok-bg:#e7f6ee; --danger:#e0445b; --danger-bg:#fdecef;
    --radius:12px; --shadow:0 2px 14px rgba(30,40,70,.07);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--bg);color:var(--ink);font-size:15px}
  .wrap{max-width:960px;margin:0 auto;padding:18px 14px 70px}
  header.top{margin-bottom:14px}
  header.top h1{font-size:20px;margin:0 0 2px;font-weight:700}
  header.top p{margin:0;color:var(--muted);font-size:13px}

  .panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:14px;margin-bottom:14px}
  .controls{display:flex;flex-wrap:wrap;gap:10px}
  .controls select,.controls input{height:42px;border:1px solid var(--line);
    border-radius:9px;padding:0 12px;font-size:15px;background:#fff;color:var(--ink);outline:none}
  .controls select{flex:1;min-width:200px;cursor:pointer}
  .controls input{flex:1;min-width:180px}
  .controls select:focus,.controls input:focus{border-color:var(--brand)}

  .progress-wrap{margin-top:12px}
  .progress-text{display:flex;justify-content:space-between;font-size:13px;
    color:var(--muted);margin-bottom:5px}
  .progress-text b{color:var(--ink)}
  .bar{height:9px;background:#eaeef6;border-radius:6px;overflow:hidden}
  .bar > div{height:100%;background:var(--ok);width:0;transition:width .3s}

  table{width:100%;border-collapse:collapse}
  thead th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);
    text-align:left;padding:10px 12px;background:#fafbfe;position:sticky;top:0;border-bottom:1px solid var(--line)}
  tbody td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top}
  tbody tr.done{background:#f1faf5}
  tbody tr:hover{background:#f7f9fe}
  tbody tr.done:hover{background:#e9f6ef}
  td.nie{font-family:ui-monospace,Menlo,monospace;font-size:13px;color:var(--muted);white-space:nowrap}
  td.sec{text-align:center;color:var(--muted);width:50px}
  td.esc{font-size:12px;color:var(--muted)}
  .name{font-weight:500}

  /* Columna de serie / buscador */
  th.th-serie,td.cell-serie{width:230px}
  .serie-input{width:100%;height:38px;border:1px solid var(--line);border-radius:8px;
    padding:0 10px;font-size:14px;font-family:ui-monospace,Menlo,monospace;outline:none;background:#fff;color:var(--ink)}
  .serie-input:focus{border-color:var(--brand)}
  .serie-input:disabled{opacity:.5;cursor:wait}
  .matches{margin-top:4px;border-radius:8px;overflow:hidden}
  .matches:not(:empty){border:1px solid var(--line)}
  .match{display:flex;justify-content:space-between;align-items:center;gap:8px;
    padding:8px 10px;cursor:pointer;background:#fff;border-bottom:1px solid var(--line)}
  .match:last-child{border-bottom:0}
  .match:hover{background:#eef3ff}
  .match .ms{font-family:ui-monospace,Menlo,monospace;font-size:13px;color:var(--ink)}
  .match .mm{font-size:11px;color:var(--muted);white-space:nowrap}
  .match.empty,.match.more{cursor:default;color:var(--muted);font-size:12px;justify-content:flex-start}
  .match.empty:hover,.match.more:hover{background:#fff}

  .assigned{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .assigned .serie{font-family:ui-monospace,Menlo,monospace;font-size:13px;font-weight:600;
    background:var(--ok-bg);color:var(--ok);padding:5px 9px;border-radius:8px}
  .rm{border:0;background:#f1f3f8;color:var(--muted);width:30px;height:30px;border-radius:8px;
    font-size:15px;cursor:pointer;line-height:1}
  .rm:hover{background:var(--danger-bg);color:var(--danger)}
  .badge{display:inline-block;margin-top:5px;font-size:11px;color:var(--muted)}

  .state{padding:36px 16px;text-align:center;color:var(--muted)}
  .table-scroll{overflow-x:auto}

  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    padding:11px 18px;border-radius:10px;font-weight:600;font-size:13px;
    box-shadow:0 6px 24px rgba(0,0,0,.18);opacity:0;pointer-events:none;transition:.25s;z-index:90;max-width:90vw;text-align:center}
  #toast.show{opacity:1}
  #toast.ok{background:var(--ok-bg);color:var(--ok)}
  #toast.err{background:var(--danger-bg);color:var(--danger)}
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <h1>📲 Entrega de Tablets</h1>
    <p>Escribe los últimos dígitos de la serie y elige la coincidente. Se guarda solo.</p>
  </header>

  <div class="panel">
    <div class="controls">
      <select id="school" onchange="render()">
        <option value="">Todas las escuelas</option>
      </select>
      <input type="text" id="search" placeholder="🔎 Buscar estudiante por NIE o nombre…" oninput="render()">
    </div>
    <div class="progress-wrap">
      <div class="progress-text">
        <span id="progLabel">Cargando…</span>
        <span id="progPct"></span>
      </div>
      <div class="bar"><div id="barFill"></div></div>
    </div>
  </div>

  <div class="panel" style="padding:0;overflow:hidden">
    <div class="table-scroll">
      <table>
        <thead><tr>
          <th>NIE</th><th>Estudiante</th>
          <th style="text-align:center">Sec.</th>
          <th id="thEsc">Escuela</th>
          <th class="th-serie">Serie de la tablet</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div id="state" class="state">Cargando estudiantes…</div>
  </div>
</div>

<div id="toast"></div>

<script>
  const MIN_CHARS = 2;   // mínimo de dígitos para empezar a mostrar coincidencias
  const MAX_SHOW  = 8;   // máximo de coincidencias visibles

  let STUDENTS = [];
  let AVAILABLE = [];    // [{serie, marca, modelo}] disponibles para asignar

  function server(fn){
    const args = Array.prototype.slice.call(arguments, 1);
    return new Promise((resolve, reject) => {
      google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[fn].apply(null, args);
    });
  }

  function toast(msg, type){
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = (type || 'ok') + ' show';
    clearTimeout(t._t); t._t = setTimeout(() => t.className = (type||'ok'), 2400);
  }

  function esc(v){
    return String(v == null ? '' : v).replace(/[&<>"']/g, c => (
      {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  async function load(){
    try{
      const data = await server('getData');
      STUDENTS = data.students || [];
      STUDENTS.forEach(s => {
        s.assignedTablet = s.serie ? { serie: s.serie, marca: '', modelo: '' } : null;
      });

      const sel = document.getElementById('school');
      (data.schools || []).forEach(s => {
        const o = document.createElement('option');
        o.value = s.codigo;
        o.textContent = s.escuela + ' (' + s.codigo + ')';
        sel.appendChild(o);
      });

      const t = await server('getAvailableTablets');
      if (t && t.ok) AVAILABLE = t.tablets || [];
      else { AVAILABLE = []; toast(t && t.error ? t.error : 'No se pudo leer las tablets', 'err'); }

      render();
    }catch(e){
      document.getElementById('state').textContent = 'Error al cargar: ' + e.message;
    }
  }

  function filtered(){
    const cod = document.getElementById('school').value;
    const q = document.getElementById('search').value.trim().toLowerCase();
    return STUDENTS.filter(s => {
      if (cod && s.codigo !== cod) return false;
      if (q && !(s.nie.toLowerCase().includes(q) || s.estudiante.toLowerCase().includes(q))) return false;
      return true;
    });
  }

  function rowHtml(s, showEsc){
    let serieCell;
    if (s.serie){
      serieCell =
        '<div class="assigned">' +
          '<span class="serie">' + esc(s.serie) + '</span>' +
          '<button class="rm" title="Liberar serie" aria-label="Liberar serie">&times;</button>' +
        '</div>';
    } else {
      serieCell =
        '<input class="serie-input" type="text" autocomplete="off" autocapitalize="off" ' +
          'spellcheck="false" placeholder="últimos dígitos…">' +
        '<div class="matches"></div>' +
        (s.entregado ? '<span class="badge">Marcada SI — asigna su serie</span>' : '');
    }
    return (
      '<tr class="' + (s.entregado ? 'done' : '') + '">' +
        '<td class="nie">' + esc(s.nie) + '</td>' +
        '<td class="name">' + esc(s.estudiante) + '</td>' +
        '<td class="sec">' + esc(s.seccion) + '</td>' +
        (showEsc ? '<td class="esc">' + esc(s.escuela) + '</td>' : '') +
        '<td class="cell-serie" data-row="' + s.row + '" data-nie="' + esc(s.nie) + '">' + serieCell + '</td>' +
      '</tr>'
    );
  }

  function render(){
    const list = filtered();
    const showEsc = !document.getElementById('school').value;
    document.getElementById('thEsc').style.display = showEsc ? '' : 'none';

    const tbody = document.getElementById('tbody');
    const state = document.getElementById('state');

    if (list.length === 0){
      tbody.innerHTML = '';
      state.style.display = 'block';
      state.textContent = STUDENTS.length === 0 ? 'No hay estudiantes.' : 'Sin resultados.';
    } else {
      state.style.display = 'none';
      tbody.innerHTML = list.map(s => rowHtml(s, showEsc)).join('');
    }
    updateProgress(list);
  }

  function updateProgress(list){
    list = list || filtered();
    const total = list.length;
    const done = list.filter(s => s.entregado).length;
    const pct = total ? Math.round(done / total * 100) : 0;
    document.getElementById('progLabel').innerHTML =
      'Entregadas: <b>' + done + '</b> de <b>' + total + '</b>';
    document.getElementById('progPct').textContent = pct + '%';
    document.getElementById('barFill').style.width = pct + '%';
  }

  /* ---- Buscador de series por terminación ---- */
  function matchSeries(query){
    const q = String(query).trim().toUpperCase();
    if (q.length < MIN_CHARS) return [];
    const res = [];
    for (const tb of AVAILABLE){
      if (String(tb.serie).toUpperCase().endsWith(q)) res.push(tb);
    }
    return res;
  }

  function renderMatches(input){
    const cell = input.closest('.cell-serie');
    const box = cell.querySelector('.matches');
    const val = input.value.trim();
    if (val.length < MIN_CHARS){ box.innerHTML = ''; return; }
    const all = matchSeries(val);
    if (all.length === 0){ box.innerHTML = '<div class="match empty">Sin coincidencias</div>'; return; }
    const shown = all.slice(0, MAX_SHOW);
    box.innerHTML = shown.map(tb =>
      '<div class="match" data-serie="' + esc(tb.serie) + '">' +
        '<span class="ms">' + esc(tb.serie) + '</span>' +
        ((tb.marca || tb.modelo)
          ? '<span class="mm">' + esc((tb.marca + ' ' + tb.modelo).trim()) + '</span>' : '') +
      '</div>'
    ).join('') +
    (all.length > MAX_SHOW
      ? '<div class="match more">+' + (all.length - MAX_SHOW) + ' más… escribe más dígitos</div>' : '');
  }

  /* ---- Asignar / liberar ---- */
  function assign(cell, serie){
    const row = Number(cell.dataset.row);
    const nie = cell.dataset.nie;
    const input = cell.querySelector('.serie-input');
    if (input) input.disabled = true;

    server('assignSerial', row, nie, serie)
      .then(res => {
        if (!res || !res.ok) throw new Error((res && res.error) || 'Error desconocido');
        const s = STUDENTS.find(x => x.nie === nie);
        const i = AVAILABLE.findIndex(t => String(t.serie).toUpperCase() === String(serie).toUpperCase());
        const obj = i >= 0 ? AVAILABLE.splice(i, 1)[0] : { serie: serie, marca: '', modelo: '' };
        if (s){ s.serie = res.serie || serie; s.entregado = true; s.assignedTablet = obj; }
        render();
        toast('✓ Tablet asignada: ' + (res.serie || serie));
      })
      .catch(e => {
        if (input) input.disabled = false;
        toast('No se guardó: ' + e.message, 'err');
      });
  }

  function unassign(cell){
    const row = Number(cell.dataset.row);
    const nie = cell.dataset.nie;
    const btn = cell.querySelector('.rm');
    if (btn) btn.disabled = true;

    server('unassignSerial', row, nie)
      .then(res => {
        if (!res || !res.ok) throw new Error((res && res.error) || 'Error desconocido');
        const s = STUDENTS.find(x => x.nie === nie);
        if (s){
          if (s.assignedTablet) AVAILABLE.push(s.assignedTablet);
          s.serie = ''; s.entregado = false; s.assignedTablet = null;
        }
        render();
        toast('Serie liberada');
      })
      .catch(e => {
        if (btn) btn.disabled = false;
        toast('No se pudo liberar: ' + e.message, 'err');
      });
  }

  /* ---- Eventos delegados ---- */
  const tbody = document.getElementById('tbody');

  tbody.addEventListener('input', e => {
    if (e.target.classList.contains('serie-input')) renderMatches(e.target);
  });

  tbody.addEventListener('keydown', e => {
    if (e.target.classList.contains('serie-input') && e.key === 'Enter'){
      e.preventDefault();
      const all = matchSeries(e.target.value);
      if (all.length >= 1) assign(e.target.closest('.cell-serie'), all[0].serie);
    }
  });

  tbody.addEventListener('click', e => {
    const m = e.target.closest('.match');
    if (m && m.dataset.serie){ assign(m.closest('.cell-serie'), m.dataset.serie); return; }
    const rm = e.target.closest('.rm');
    if (rm){ unassign(rm.closest('.cell-serie')); return; }
  });

  load();
</script>
</body>
</html>
